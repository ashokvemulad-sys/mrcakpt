<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>School Grant Status Report</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #334155;
            --accent: #2563eb;
            --bg: #f8fafc;
            --border: #e2e8f0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            color: #1e293b;
        }
        .container { max-width: 100%; margin: auto; }
        
        .header {
            background: var(--primary);
            color: white;
            padding: 25px 15px;
            border-radius: 12px 12px 0 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .logo-placeholder {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
            color: white;
            text-align: center;
            padding: 5px;
            box-sizing: border-box;
        }

        /https://pfms.nic.in/SitePages/images/logo.png/
        .header img {
            max-width: 100px;
            height: auto;
            margin-bottom: 5px;
        }

        h1 { margin: 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .search-area {
            background: white;
            padding: 20px;
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 12px 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--accent);
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .report-card {
            display: none;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .school-info {
            padding: 20px;
            background: #f1f5f9;
            border-bottom: 2px solid var(--primary);
        }
        .school-name {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 10px;
            display: block;
        }
        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-size: 0.85rem;
        }
        .meta-label { color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; }

        .table-container { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            background: #f8fafc;
            color: var(--secondary);
            text-align: left;
            padding: 12px;
            border: 1px solid var(--border);
            font-weight: 600;
        }
        td {
            padding: 12px;
            border: 1px solid var(--border);
            vertical-align: middle;
        }
        .amount-col {
            text-align: right;
            font-weight: 700;
            color: #15803d;
            background: #f0fdf4;
        }
        .date-col { color: #64748b; font-size: 0.8rem; white-space: nowrap; }

        .print-btn {
            display: block;
            width: calc(100% - 40px);
            margin: 20px auto;
            padding: 15px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        @media print {
            .search-area, .print-btn, .header { display: none !important; }
            body { padding: 0; background: white; }
            .report-card { display: block !important; border: 1px solid #000; box-shadow: none; border-radius: 0; }
            th { background: #eee !important; }
            .amount-col { background: none !important; color: #000 !important; }
        }
    </style>
</head>

            document.getElementById('outPFMS').innerText = item['PFMS UNQIUE CODE'];

                if (val === 0 || val === null) continue;

                let date = "-";

                    const parts = key.split('Credited Date:');
                    name = parts[0].trim();
                    date = parts[1].trim();
                }

                    <td>${name}</td>
                    <td class="date-col">${date}</td>
